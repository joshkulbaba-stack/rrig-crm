<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRIG — CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#1a2332;display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#1A2332;color:white;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo h1{font-size:12px;font-weight:700;letter-spacing:.5px;color:#C0392B;text-transform:uppercase;line-height:1.4}
.logo p{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
nav{flex:1;padding:10px 0;overflow-y:auto}
nav .sec{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);padding:14px 20px 5px}
nav a{display:flex;align-items:center;gap:9px;padding:9px 20px;color:rgba(255,255,255,.65);text-decoration:none;font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
nav a:hover{background:rgba(255,255,255,.05);color:white}
nav a.active{background:rgba(192,57,43,.15);color:white;border-left-color:#C0392B}
nav a .ico{width:16px;text-align:center;font-style:normal;flex-shrink:0}
.sidebar-footer{padding:10px 20px;font-size:10px;color:rgba(255,255,255,.25);border-top:1px solid rgba(255,255,255,.08)}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
#topbar{background:white;border-bottom:1px solid #e2e8f0;padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h2{font-size:17px;font-weight:600;color:#1A2332}
.topbar-actions{display:flex;gap:8px;align-items:center}
#content{padding:24px 28px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:white;border-radius:8px;border:1px solid #e2e8f0;padding:18px 20px;border-left:4px solid #C0392B}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b7a8d;margin-bottom:6px}
.kpi .val{font-size:22px;font-weight:700;color:#1A2332}
.kpi .sub{font-size:11px;color:#9aabb8;margin-top:3px}
.card{background:white;border-radius:8px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:#6b7a8d;text-transform:uppercase;letter-spacing:.5px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8fafc;color:#6b7a8d;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:hover{background:#fafbfc;cursor:pointer}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-active{background:#d1fae5;color:#065f46}
.b-sent{background:#dbeafe;color:#1e40af}
.b-draft{background:#f1f5f9;color:#475569}
.b-awarded{background:#fef3c7;color:#92400e}
.b-complete{background:#e0e7ff;color:#3730a3}
.b-unpaid{background:#fee2e2;color:#991b1b}
.b-paid{background:#d1fae5;color:#065f46}
.b-overdue{background:#fecaca;color:#7f1d1d}
.b-lost{background:#fde8d8;color:#7c2d12}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:#1A2332;color:white}.btn-primary:hover{background:#111B27}
.btn-gold{background:#C0392B;color:white}.btn-gold:hover{background:#A02D24}
.btn-outline{background:white;color:#1A2332;border:1px solid #d1d9e0}.btn-outline:hover{background:#f8fafc}
.btn-danger{background:#fee2e2;color:#991b1b}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:12px;font-weight:500;color:#475569}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #d1d9e0;border-radius:6px;font-size:13px;font-family:inherit;color:#1a2332;background:white;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1A2332;box-shadow:0 0 0 3px rgba(30,58,95,.08)}
.fg textarea{resize:vertical;min-height:70px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:1000;overflow-y:auto}
.modal-bg.hidden{display:none}
.modal{background:white;border-radius:10px;width:100%;max-width:780px;overflow:hidden;position:relative}
.modal-lg{max-width:960px}
.modal-hdr{padding:18px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:600;color:#1A2332}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#6b7a8d;line-height:1;padding:4px}
.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
.modal-ftr{padding:14px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;background:white}
.li-tbl{width:100%;border-collapse:collapse;margin-bottom:10px}
.li-tbl th{background:#f8fafc;font-size:11px;text-transform:uppercase;color:#6b7a8d;padding:7px 8px;text-align:left;border-bottom:1px solid #e2e8f0}
.li-tbl td{padding:5px 4px;vertical-align:middle}
.li-tbl input,.li-tbl select{padding:5px 7px;border:1px solid #d1d9e0;border-radius:4px;font-size:13px;width:100%;font-family:inherit}
.li-tbl .right{text-align:right}
.totals-box{display:flex;justify-content:flex-end;margin-top:8px}
.totals-box table{font-size:13px}
.totals-box td{padding:4px 8px}
.totals-box .tot-row td{font-weight:700;font-size:14px;border-top:2px solid #1A2332;color:#1A2332}
.section-divider{font-size:12px;font-weight:600;color:#6b7a8d;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin:20px 0 14px}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px}
.alert-info{background:#dbeafe;color:#1e40af}
.search-bar{position:relative;flex:1;max-width:320px}
.search-bar input{width:100%;padding:7px 10px 7px 32px;border:1px solid #d1d9e0;border-radius:6px;font-size:13px;font-family:inherit}
.search-bar input:focus{outline:none;border-color:#1A2332}
.search-bar::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.empty{text-align:center;padding:40px;color:#9aabb8;font-size:14px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.detail-field .lbl{font-size:11px;color:#6b7a8d;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.detail-field .val{font-size:13px;color:#1a2332;font-weight:500}
.hs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.hs-card{background:white;border-radius:8px;border:1px solid #e2e8f0;padding:18px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .15s}
.hs-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hs-card .hs-icon{font-size:28px}
.hs-card .hs-name{font-size:14px;font-weight:600;color:#1A2332}
.hs-card .hs-cat{font-size:11px;color:#6b7a8d;text-transform:uppercase;letter-spacing:.4px}
.hs-card .hs-actions{display:flex;gap:6px;margin-top:4px}
.two-col-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* Doc preview */
#doc-overlay{position:fixed;inset:0;background:white;z-index:2000;overflow-y:auto;padding:32px;display:none}
#doc-overlay.open{display:block}
.doc-toolbar{display:flex;gap:10px;margin-bottom:24px;align-items:center}
.doc-toolbar h3{flex:1;font-size:15px;font-weight:600;color:#1A2332}
.doc-page{max-width:800px;margin:0 auto;background:white;font-family:Arial,sans-serif;border:1px solid #e2e8f0;border-radius:4px;overflow:hidden}
.doc-head{background:#1A2332;color:white;padding:22px 28px;display:flex;justify-content:space-between;align-items:flex-start}
.doc-head-left h1{font-size:20px;font-weight:700}
.doc-head-left p{font-size:11px;opacity:.75;margin-top:3px}
.doc-head-right{text-align:right}
.doc-head-right .doc-type{background:#C0392B;color:white;display:inline-block;padding:4px 14px;border-radius:3px;font-size:16px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.doc-head-right .doc-num{font-size:18px;font-weight:700}
.doc-body{padding:24px 28px}
.doc-two{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px}
.doc-box-title{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b7a8d;margin-bottom:8px;font-weight:600;border-bottom:1px solid #e2e8f0;padding-bottom:4px}
.doc-box p{font-size:12.5px;line-height:1.7;color:#1a2332}
.doc-box strong{color:#1A2332}
.doc-items-tbl{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.doc-items-tbl th{background:#1A2332;color:white;padding:9px 10px;text-align:left;font-size:11px}
.doc-items-tbl th.right,.doc-items-tbl td.right{text-align:right}
.doc-items-tbl td{padding:9px 10px;border-bottom:1px solid #f1f5f9}
.doc-items-tbl tr:last-child td{border-bottom:1px solid #d1d9e0}
.doc-totals-wrap{display:flex;justify-content:flex-end;margin-bottom:20px}
.doc-totals-tbl{min-width:240px;font-size:13px;border-collapse:collapse}
.doc-totals-tbl td{padding:5px 10px}
.doc-totals-tbl .final-row{background:#1A2332;color:white;font-weight:700;font-size:14px}
.doc-totals-tbl .final-row td{padding:8px 10px}
.doc-remit{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;margin-bottom:20px;font-size:12.5px}
.doc-remit h4{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b7a8d;margin-bottom:8px}
.doc-remit p{line-height:1.8;color:#1a2332}
.doc-inclexcl{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.doc-inclexcl h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b7a8d;margin-bottom:8px}
.doc-inclexcl ul{font-size:12px;padding-left:16px;line-height:1.8;color:#1a2332}
.doc-sig{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:20px}
.doc-sig-block .sig-line{border-top:1px solid #1A2332;padding-top:6px;margin-top:36px;font-size:12px;color:#6b7a8d}
.doc-notes{background:#fefefe;border-left:3px solid #C0392B;padding:12px 16px;font-size:12.5px;color:#475569;margin-bottom:20px}
.doc-footer{background:#1A2332;color:rgba(255,255,255,.6);padding:10px 20px;text-align:center;font-size:11px}

@media print{
  @page{size:letter portrait;margin:.45in}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{overflow:visible!important;height:auto!important}
  body>*:not(#doc-overlay){display:none!important}
  #doc-overlay{
    position:static!important;
    display:block!important;
    overflow:visible!important;
    height:auto!important;
    max-height:none!important;
    padding:0!important;
    background:white!important;
  }
  #doc-overlay .doc-toolbar{display:none!important}
  .doc-page{
    border:none!important;
    border-radius:0!important;
    width:100%!important;
    max-width:100%!important;
    overflow:visible!important;
    box-shadow:none!important;
    margin:0!important;
  }
  .doc-page>div[style*="height:4px"]{height:4px!important}
  .doc-page table{page-break-inside:avoid;width:100%!important}
}

/* ── HAMBURGER BUTTON ── */
#menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;color:#1A2332;flex-shrink:0}
#menu-toggle span{display:block;width:22px;height:2px;background:currentColor;margin:5px 0;border-radius:2px;transition:all .2s}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:499}

/* ── MOBILE ── */
@media(max-width:768px){
  /* body fills viewport, no overflow — #main handles scrolling */
  body{overflow:hidden;height:100dvh;height:100vh}

  /* sidebar: always off-screen on mobile, slides in when .open */
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:75vw;max-width:280px;min-width:200px;
    z-index:500;
    transform:translateX(-100%);
    transition:transform .25s ease;
    overflow-y:auto;
    flex-shrink:0;
  }
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}

  /* main: full width, full height, scroll internally */
  #main{
    width:100%;
    height:100dvh;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* topbar */
  #menu-toggle{display:flex;flex-direction:column;justify-content:center}
  #topbar{padding:0 14px;height:50px;flex-shrink:0}
  #topbar h2{font-size:15px}
  .topbar-actions .btn span{display:none}
  .topbar-actions .btn{padding:6px 8px}

  /* content scrolls within remaining height */
  #content{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:14px;
  }

  /* KPI grid */
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi{padding:12px 14px}
  .kpi .val{font-size:18px}

  /* tables */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:520px}

  /* forms */
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .fg.full{grid-column:1}

  /* modals */
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:14px 14px 0 0;max-width:100%;max-height:92dvh;max-height:92vh;display:flex;flex-direction:column}
  .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal-ftr{flex-shrink:0}

  /* doc overlay */
  #doc-overlay{padding:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .doc-toolbar{flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .doc-toolbar h3{font-size:13px;width:100%}
  .doc-page{border-radius:0;border:none}
  .doc-page table{min-width:0}
  .doc-page{font-size:11px}
  .doc-page div[style*="max-width:820px"]{max-width:100%!important}
  .doc-page div[style*="padding:20px 24px"]{padding:12px!important}
}

@media(max-width:420px){
  .kpi-grid{grid-template-columns:1fr}
  .topbar-actions{gap:4px}
  #sidebar{width:82vw}
}
</style>

// ─── HELPERS ────────────────────────────────────────────────────────────────
const fmt$ = v => '$'+(+v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => { if(!d) return '—'; const p=String(d).split('-'); if(p.length<3||!p[1]) return String(d); const months=['January','February','March','April','May','June','July','August','September','October','November','December']; return months[parseInt(p[1],10)-1]+' '+parseInt(p[2],10)+', '+p[0]; };
const today = () => new Date().toISOString().split('T')[0];
const addDays = (d,n) => { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().split('T')[0]; };
function custName(id){ const c=DB.customers.find(x=>x.id===id); return c?c.company:id; }
function lineTotal(items){ return items.reduce((s,i)=>(s+(+i.qty||0)*(+i.price||0)),0); }
function lineSubtotal(items){ return lineTotal(items); }
function nextId(prefix,arr){ const nums=arr.map(x=>parseInt(x.id.split('-').pop())||0); return prefix+'-'+(Math.max(0,...nums)+1).toString().padStart(3,'0'); }

function badgeClass(s){
  const m={Active:'b-active',Sent:'b-sent',Draft:'b-draft',Awarded:'b-awarded',Complete:'b-complete',Lost:'b-lost',Unpaid:'b-unpaid',Paid:'b-paid',Overdue:'b-overdue',Issued:'b-sent',Received:'b-active'};
  return m[s]||'b-draft';
}

// ─── EXCEL SYNC ─────────────────────────────────────────────────────────────
function _xlDate(val){
  if(!val) return '';
  if(val instanceof Date){ const d=val; return (d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  if(typeof val==='number'){ const d=new Date(Math.round((val-25569)*86400)*1000); return (d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')); }
  const s=String(val).trim();
  if(!s||s==='0'||s==='false') return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Try parsing any other string format (e.g. "4/15/2026", "Apr 15, 2026")
  const d=new Date(s);
  if(!isNaN(d)) return (d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  return '';
}
function _toXlSerial(str){
  if(!str) return '';
  const d=new Date(str+'T12:00:00Z');
  if(isNaN(d)) return str;
  return Math.round((d.getTime()/86400000)+25569);
}
function _readSheet(wb, sheetName, idCol){
  // Find sheet by partial emoji+name match
  const key=Object.keys(wb.Sheets).find(k=>k.includes(sheetName));
  if(!key) return [];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[key],{header:1,defval:'',raw:false});
  const hdrIdx=rows.findIndex(r=>r.includes(idCol));
  if(hdrIdx<0) return [];
  const hdrs=rows[hdrIdx];
  return rows.slice(hdrIdx+1)
    .filter(r=>r[hdrs.indexOf(idCol)])
    .map(r=>{ const o={}; hdrs.forEach((h,i)=>{ if(h) o[h]=r[i]??''; }); return o; });
}

          vendorAddr:r['Vendor Address']||r['Supplier Address']||exist?.vendorAddr||'',
          vendorCity:r['Vendor City']||r['Supplier City']||exist?.vendorCity||'',
          vendorState:r['Vendor State']||r['Supplier State']||exist?.vendorState||'',
          vendorPhone:r['Vendor Phone']||r['Supplier Phone']||exist?.vendorPhone||'',
          vendorEmail:r['Vendor Email']||r['Supplier Email']||exist?.vendorEmail||'',
          date:_xlDate(r['PO Date']||r['Date Issued']),
          reqDate:_xlDate(r['Required Date']||r['Delivery Date']),
          category:r['Category']||exist?.category||'',
          terms:r['Payment Terms']||exist?.terms||'Net 60',
          shipTo:r['Ship To']||r['Ship To / Location']||exist?.shipTo||'',
          attn:r['Attention']||r['Attn']||exist?.attn||'',
          currency:r['Currency']||exist?.currency||'USD',
          taxRate:(function(v){v=parseFloat(String(v||0).replace('%',''));return v>1?Math.round(v*100)/100:Math.round(v*10000)/100;})(r['Tax Rate']||r['Tax Rate (%)']),
          ccFees:+(r['CC/Other Fees ($)']||r['CC Fees ($)']||0),
          status:r['Status']||'Open',
          notes:exist?.notes||'',
          items,
        };
      });
    }

    saveDB(); render();
    alert(`✅ Imported from Excel:\n• ${DB.customers.length} customers\n• ${DB.quotes.length} quotes\n• ${DB.jobs.length} jobs\n• ${DB.invoices.length} invoices\n• ${DB.pos.length} POs`);
}

function importFromExcel(){
  if(typeof XLSX==='undefined'){ alert('SheetJS not loaded — check internet connection.'); return; }
  const input=document.createElement('input'); input.type='file'; input.accept='.xlsx,.xls';
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array',cellDates:false,raw:false});
    _applyWorkbook(wb);
  };
  input.click();
}

function _buildWorkbook(){
  const wb=XLSX.utils.book_new();

  // ── Customers ──
  const cHdr=['Cust ID','Company Name','Type','Primary Contact','Title','Phone','Email','Address','City','State/Province','Country','Currency','Default Tax Rate','Tax Rate (%)','Payment Terms','Credit Limit ($)','Lead Source','Notes'];
  const cData=DB.customers.map(c=>[
    c.id,c.company,c.type||'',c.contact,c.title||'',c.phone,c.email,
    c.addr,c.city,c.state,c.country||'USA',c.currency||'USD',
    (c.taxRate||0).toFixed(2)+'% Tax',(c.taxRate||0)/100,
    c.terms,c.creditLimit||'',c.leadSource||'',c.notes
  ]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([cHdr,...cData]),'👥 Customers');

  // ── Quotes ──
  const qHdr=['Quote #','Date','Valid Until','Customer ID','Customer Name','Currency','Project / Scope','Site Location','Category','Labour Hrs','Labour Rate ($/hr)','Labour ($)','Materials ($)','Flights ($)','Hotels ($)','Rental Vehicle ($)','LOA ($)','Fuel ($)','Other/Misc ($)','Quote Total ($)','Status','Lead Source','Notes'];
  const qData=DB.quotes.map(q=>{
    const cu=DB.customers.find(c=>c.id===q.custId)||{};
    const total=lineTotal(q.items);
    // Split items back into categories where possible
    const get=desc=>{ const i=q.items.find(x=>x.desc===desc); return i?(+(i.qty||1))*(+(i.price||0)):0; };
    const labour=get('Labour'); const lItem=q.items.find(x=>x.desc==='Labour');
    return [
      q.id,_toXlSerial(q.date),_toXlSerial(q.validUntil),
      q.custId,cu.company||'',cu.currency||'USD',
      q.project,q.site,q.category,
      lItem?.qty||'',lItem?.price||'',labour,
      get('Materials'),get('Flights'),get('Hotels/Accommodation'),
      get('Rental Vehicle'),get('Living Out Allowance (LOA)'),get('Fuel'),get('Other/Miscellaneous'),
      total,q.status,q.leadSource||'',q.notes
    ];
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([qHdr,...qData]),'📋 Quotes');

  // ── Jobs ──
  const jHdr=['Job #','Quote #','Customer ID','Customer Name','Status','Currency','Job Description','Site Location','Contract Value ($)','Start Date','End Date','Project Manager','Budgeted Labour ($)','Budgeted Materials ($)','Budgeted Subcontract ($)','Total Budget ($)','Actual Costs ($)','Gross Profit ($)','Gross Margin (%)','Notes'];
  const jData=DB.jobs.map(j=>{
    const cu=DB.customers.find(c=>c.id===j.custId)||{};
    const budget=(j.budgetLabour||0)+(j.budgetMaterials||0)+(j.budgetSub||0);
    const gp=(j.contractValue||0)-(j.actualCosts||0);
    const gm=j.contractValue?gp/j.contractValue:0;
    return [
      j.id,j.quoteId,j.custId,cu.company||'',j.status,cu.currency||'USD',
      j.desc,j.site,j.contractValue||'',
      _toXlSerial(j.startDate),_toXlSerial(j.endDate),j.pm||'',
      j.budgetLabour||'',j.budgetMaterials||'',j.budgetSub||'',budget||'',
      j.actualCosts||'',gp||'',gm||'',j.notes
    ];
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([jHdr,...jData]),'🔨 Jobs');

  // ── Invoices ──
  const iHdr=['Invoice #','Job #','Customer Name','Currency','Invoice Date','Due Date','Invoice Amount ($)','Tax Rate','Tax ($)','Total Due ($)','Total Due (USD)','Date Paid','Status','Payment Method','Days Outstanding','Notes'];
  const iData=DB.invoices.map(inv=>{
    const cu=DB.customers.find(c=>c.id===inv.custId)||{};
    const sub=lineTotal(inv.items);
    const tax=sub*(+(inv.taxRate)||0)/100;
    const total=sub+tax;
    return [
      inv.id,inv.jobId,cu.company||'',cu.currency||'USD',
      _toXlSerial(inv.date),_toXlSerial(inv.dueDate),
      sub,(inv.taxRate||0)/100,tax,total,total,
      _toXlSerial(inv.datePaid),inv.status,inv.payMethod||inv.terms||'','',inv.notes
    ];
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([iHdr,...iData]),'🧾 Invoices');

  // ── POs ──
  const pHdr=['PO #','Job #','Supplier Name','Supplier Contact','Vendor Country','Currency','PO Date','Required Date','Category','PO Amount ($)','Tax Rate','Tax ($)','CC/Other Fees ($)','Total PO ($)','Total PO (USD)','Status','Date Received','Invoice Ref','Notes'];
  const pData=DB.pos.map(p=>{
    const sub=lineTotal(p.items);
    const tax=sub*(+(p.taxRate)||0)/100;
    const total=sub+tax+(+(p.ccFees)||0);
    return [
      p.id,p.jobId,p.vendor,p.vendorContact||'',p.vendorState||'USA','USD',
      _toXlSerial(p.date),_toXlSerial(p.reqDate),p.category||'',
      sub,(p.taxRate||0)/100,tax,p.ccFees||0,total,total,
      p.status,'','',p.notes
    ];
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([pHdr,...pData]),'📦 POs');

  return wb;
}

// ─── WORD EXPORT ────────────────────────────────────────────────────────────
// Loads the actual uploaded RRIG DOCX templates and fills in live data

function xe(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtN(n){ return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function findTblEnd(xml, startIdx){
  let d=0, pos=startIdx;
  while(pos<xml.length){
    // Only match actual table opens (<w:tbl> or <w:tbl ), not <w:tblPr>, <w:tblGrid> etc.
    let o=-1, scan=pos;
    while(scan<xml.length){
      const idx=xml.indexOf('<w:tbl',scan);
      if(idx===-1) break;
      const ch=xml[idx+6];
      if(ch==='>'||ch===' '||ch==='\r'||ch==='\n'){ o=idx; break; }
      scan=idx+7;
    }
    const c=xml.indexOf('</w:tbl>',pos);
    if(c===-1) return -1;
    if(o!==-1&&o<c){ d++; pos=o+7; }
    else{ if(d===0) return c+8; d--; pos=c+8; }
  }
  return -1;
}

// Find the next <w:tc ...> opening tag at or after pos, return its index or -1
function _nextTc(xml, pos){
  let i=pos;
  while(i<xml.length){
    const idx=xml.indexOf('<w:tc',i);
    if(idx===-1) return -1;
    const ch=xml[idx+5];
    if(ch==='>'||ch===' '||ch==='\r'||ch==='\n') return idx;
    i=idx+5;
  }
  return -1;
}
// Extract tcPr block safely: returns [tcOpenTag+tcPr, endPos] or ['<w:tc>', tcStart+5]
function _extractTcPr(xml, tcStart){
  // find end of opening <w:tc ...> tag
  const tagEnd=xml.indexOf('>',tcStart)+1;
  const tcOpen=xml.substring(tcStart,tagEnd);
  const prEnd=xml.indexOf('</w:tcPr>',tcStart);
  const nextTr=xml.indexOf('</w:tr>',tcStart);
  const nextTc=_nextTc(xml,tagEnd);
  // tcPr must come before the next cell/row
  if(prEnd!==-1 && (nextTc===-1||prEnd<nextTc) && (nextTr===-1||prEnd<nextTr)){
    return [xml.substring(tcStart,prEnd+9), prEnd+9];
  }
  return [tcOpen, tagEnd];
}

function replaceLabeledCell(xml, labelText, newText){
  const lIdx=xml.indexOf('>'+labelText+'<');
  if(lIdx===-1) return xml;
  const lTcEnd=xml.indexOf('</w:tc>',lIdx);
  if(lTcEnd===-1) return xml;
  const vTcStart=_nextTc(xml,lTcEnd+7);
  if(vTcStart===-1) return xml;
  const vTcEnd=xml.indexOf('</w:tc>',vTcStart);
  if(vTcEnd===-1) return xml;
  const [tcPr]=_extractTcPr(xml,vTcStart);
  const newTc=tcPr
    +'<w:p><w:pPr><w:spacing w:before="30" w:after="30"/></w:pPr>'
    +(newText?'<w:r><w:t xml:space="preserve">'+xe(String(newText))+'</w:t></w:r>':'')
    +'</w:p></w:tc>';
  return xml.substring(0,vTcStart)+newTc+xml.substring(vTcEnd+7);
}

function setRowCell(rowXml, colIdx, text, align){
  const tcRe=/<w:tc[\s>][\s\S]*?<\/w:tc>/g;
  const matches=[...rowXml.matchAll(tcRe)];
  if(colIdx>=matches.length) return rowXml;
  const m=matches[colIdx];
  const [tcPr]=_extractTcPr(m[0],0);
  const alXml=align?'<w:jc w:val="'+align+'"/>':'';
  const newTc=tcPr
    +'<w:p><w:pPr>'+alXml+'<w:spacing w:before="0" w:after="0"/></w:pPr>'
    +(text!==null&&text!==undefined&&text!==''
        ?'<w:r><w:t xml:space="preserve">'+xe(String(text))+'</w:t></w:r>':'')
    +'</w:p></w:tc>';
  return rowXml.substring(0,m.index)+newTc+rowXml.substring(m.index+m[0].length);
}

function setAmountCell(rowXml, value){
  const matches=[...rowXml.matchAll(/<w:tc[\s>][\s\S]*?<\/w:tc>/g)];
  if(!matches.length) return rowXml;
  const last=matches[matches.length-1];
  const [tcPr]=_extractTcPr(last[0],0);
  const newTc=tcPr
    +'<w:p><w:pPr><w:jc w:val="right"/><w:spacing w:before="0" w:after="0"/></w:pPr>'
    +'<w:r><w:t>$</w:t></w:r>'
    +'<w:r><w:t xml:space="preserve">'+xe(fmtN(value))+'</w:t></w:r>'
    +'</w:p></w:tc>';
  return rowXml.substring(0,last.index)+newTc+rowXml.substring(last.index+last[0].length);
}

function rebuildLineItems(xml, items, sub, taxPct, extra, descColOffset){
  descColOffset=descColOffset||0;
  extra=extra||0;
  const tax=sub*(+(taxPct)||0)/100;
  const total=sub+tax+extra;

  const descIdx=xml.indexOf('>Description<');
  if(descIdx===-1) return xml;
  const tblStart=xml.lastIndexOf('<w:tbl>',descIdx);
  const tblEnd=findTblEnd(xml,tblStart);
  const tblXml=xml.substring(tblStart,tblEnd);

  const gridEnd=tblXml.indexOf('</w:tblGrid>')+12;
  const tblPrefix=tblXml.substring(0,gridEnd);

  const hdRowStart=tblXml.lastIndexOf('<w:tr',tblXml.indexOf('>Description<'));
  const hdRowEnd=tblXml.indexOf('</w:tr>',hdRowStart)+7;
  const headerRow=tblXml.substring(hdRowStart,hdRowEnd);

  const firstDataStart=tblXml.indexOf('<w:tr',hdRowEnd);
  const firstDataEnd=tblXml.indexOf('</w:tr>',firstDataStart)+7;
  const templateRow=tblXml.substring(firstDataStart,firstDataEnd);

  const subIdx=tblXml.indexOf('>Subtotal<');
  const subRowStart=tblXml.lastIndexOf('<w:tr',subIdx);
  const subRowEnd=tblXml.indexOf('</w:tr>',subRowStart)+7;

  const taxIdx=tblXml.indexOf('>Tax<',subRowEnd);
  const taxRowStart=tblXml.lastIndexOf('<w:tr',taxIdx);
  const taxRowEnd=tblXml.indexOf('</w:tr>',taxRowStart)+7;

  const dataRows=items.map(function(item,idx){
    const bg=idx%2===0?'FFFFFF':'F5F3EE';
    const amt=(+(item.qty||0))*(+(item.price||0));
    let row=templateRow.replace(/w:fill="[A-F0-9]{6}"/g,'w:fill="'+bg+'"');
    if(descColOffset===1){
      row=setRowCell(row,0,String(idx+1),'center');
      row=setRowCell(row,1,item.desc||'','left');
      row=setRowCell(row,2,String(item.qty||''),'center');
      row=setRowCell(row,3,item.unit||'','center');
      row=setRowCell(row,4,fmtN(item.price),'right');
      row=setAmountCell(row,amt);
    } else {
      row=setRowCell(row,0,item.desc||'','left');
      row=setRowCell(row,1,String(item.qty||''),'center');
      row=setRowCell(row,2,item.unit||'','center');
      row=setRowCell(row,3,fmtN(item.price),'right');
      row=setAmountCell(row,amt);
    }
    return row;
  }).join('');

  const subRow=setAmountCell(tblXml.substring(subRowStart,subRowEnd),sub);
  const taxRow=setAmountCell(tblXml.substring(taxRowStart,taxRowEnd),tax);

  const newTbl=tblPrefix+headerRow+dataRows+subRow+taxRow+'</w:tbl>';
  let result=xml.substring(0,tblStart)+newTbl+xml.substring(tblEnd);

  const amtLabels=['AMOUNT DUE (USD)','TOTAL (USD)','PO TOTAL (USD)'];
  for(let i=0;i<amtLabels.length;i++){
    const lbl=amtLabels[i];
    const lIdx=result.indexOf('>'+lbl+'<');
    if(lIdx===-1) continue;
    const aTblStart=result.lastIndexOf('<w:tbl>',lIdx);
    const aTblEnd=findTblEnd(result,aTblStart);
    const aTblXml=result.substring(aTblStart,aTblEnd);
    const aRowStart=aTblXml.lastIndexOf('<w:tr',aTblXml.indexOf('>'+lbl+'<'));
    const aRowEnd=aTblXml.indexOf('</w:tr>',aRowStart)+7;
    const newARow=setAmountCell(aTblXml.substring(aRowStart,aRowEnd),total);
    result=result.substring(0,aTblStart)
      +aTblXml.substring(0,aRowStart)+newARow+aTblXml.substring(aRowEnd)
      +'</w:tbl>'
      +result.substring(aTblEnd);
    break;
  }
  return result;
}

function modifyInvoice(xml, inv, cu, job){
  cu=cu||{}; job=job||{};
  const sub=lineTotal(inv.items);
  xml=xml.split('INV-2026-001').join(xe(inv.id||''));
  xml=replaceLabeledCell(xml,'Company:',cu.company||'');
  xml=replaceLabeledCell(xml,'Attention:',cu.contact||'');
  xml=replaceLabeledCell(xml,'Address:',cu.addr||'');
  xml=replaceLabeledCell(xml,'City/State:',(cu.city||'')+(cu.state?', '+cu.state:'')+(cu.zip?' '+cu.zip:''));
  xml=replaceLabeledCell(xml,'Email:',cu.email||'');
  xml=replaceLabeledCell(xml,'Phone:',cu.phone||'');
  xml=replaceLabeledCell(xml,'Quote Ref:',job.quoteId||'--');
  xml=replaceLabeledCell(xml,'PO #:',inv.poNum||'--');
  xml=replaceLabeledCell(xml,'Invoice Date:',fmtDate(inv.date)||'');
  xml=replaceLabeledCell(xml,'Due Date:',fmtDate(inv.dueDate)||'');
  xml=replaceLabeledCell(xml,'Payment Terms:',inv.terms||'');
  xml=replaceLabeledCell(xml,'Project Name / Job #:',(job.desc||'')+(job.id?' / '+job.id:''));
  xml=replaceLabeledCell(xml,'Site / Location:',job.site||'');
  xml=rebuildLineItems(xml,inv.items,sub,inv.taxRate,0,0);
  xml=replaceLabeledCell(xml,'NOTES / COMMENTS',inv.notes||'Thank you for your business. Please contact us with any questions regarding this invoice.');
  return xml;
}

function modifyQuote(xml, q, cu){
  cu=cu||{};
  const sub=lineTotal(q.items);
  xml=xml.split('QUO-2026-001').join(xe(q.id||''));
  xml=replaceLabeledCell(xml,'Attention:',cu.contact||'');
  xml=replaceLabeledCell(xml,'Company:',cu.company||'');
  xml=replaceLabeledCell(xml,'Address:',cu.addr||'');
  xml=replaceLabeledCell(xml,'Email:',cu.email||'');
  xml=replaceLabeledCell(xml,'Phone:',cu.phone||'');
  xml=replaceLabeledCell(xml,'Date:',fmtDate(q.date)||'');
  xml=replaceLabeledCell(xml,'Valid Until:',fmtDate(q.validUntil)||'30 days from issue');
  xml=replaceLabeledCell(xml,'Prepared By:',q.preparedBy||'');
  xml=replaceLabeledCell(xml,'Project Name:',q.project||'');
  xml=replaceLabeledCell(xml,'Site / Location:',q.site||'');
  xml=replaceLabeledCell(xml,'Scope of Work:',q.category||'');
  xml=rebuildLineItems(xml,q.items,sub,cu.taxRate||0,0,0);
  if(q.notes) xml=replaceLabeledCell(xml,'NOTES',q.notes);
  return xml;
}

function modifyPO(xml, p){
  const sub=lineTotal(p.items);
  xml=xml.split('PO-2026-001').join(xe(p.id||''));
  xml=replaceLabeledCell(xml,'Vendor Name:',p.vendor||'');
  xml=replaceLabeledCell(xml,'Contact:',p.vendorContact||'');
  xml=replaceLabeledCell(xml,'Address:',(p.vendorAddr||'')+(p.vendorCity?', '+p.vendorCity:'')+(p.vendorState?' '+p.vendorState:''));
  xml=replaceLabeledCell(xml,'Phone:',p.vendorPhone||'');
  xml=replaceLabeledCell(xml,'Email:',p.vendorEmail||'');
  xml=replaceLabeledCell(xml,'Date Issued:',fmtDate(p.date)||'');
  xml=replaceLabeledCell(xml,'Delivery Date:',fmtDate(p.reqDate)||'');
  xml=replaceLabeledCell(xml,'Payment Terms:',p.terms||'Net 60');
  xml=rebuildLineItems(xml,p.items,sub,p.taxRate,+(p.ccFees)||0,1);
  if(p.notes) xml=replaceLabeledCell(xml,'NOTES / SPECIAL INSTRUCTIONS',p.notes);
  return xml;

async function dlDocx(filename, tplB64, modifier){
  if(typeof JSZip==='undefined'){ alert('JSZip not loaded - check internet.'); return; }
  try{
    const bytes=Uint8Array.from(atob(tplB64),c=>c.charCodeAt(0));
    const zip=await JSZip.loadAsync(bytes);
    let xml=await zip.file('word/document.xml').async('string');
    try{ xml=modifier(xml); }
    catch(modErr){ alert('Error filling template fields:\n'+modErr.message); console.error('modifier error',modErr); return; }
    zip.file('word/document.xml',xml);
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  } catch(e){ alert('Word generation failed:\n'+e.message); console.error('dlDocx error',e); }
}

function _dlWord(filename, bodyHtml){
  const css=`@page{size:8.5in 11in;margin:.6in}body{font-family:Arial,sans-serif;font-size:10pt;color:#1A2332;margin:0}table{border-collapse:collapse;width:100%;margin-bottom:6pt}td,th{padding:4pt 7pt;font-size:9pt;vertical-align:top;border:1pt solid #D0CCC4}.sec-hdr{background:#1A2332;color:white;font-weight:bold;font-size:8pt;letter-spacing:.4pt;border:1pt solid #1A2332}.bg{background:#F5F3EE}.lbl{font-weight:bold;width:100pt;white-space:nowrap}.sep{height:3pt;background:#C0392B;border:none;font-size:0;line-height:0}.items-hdr{background:#E8E6E0;font-weight:bold;font-size:8pt;text-transform:uppercase;letter-spacing:.3pt}.red-row{background:#C0392B;color:white;font-weight:bold}.navy-items-hdr{background:#1A2332;color:white;font-weight:bold;font-size:8pt;text-transform:uppercase}`;
  const doc=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]--><style>${css}</style></head><body>${bodyHtml}</body></html>`;
  const blob=new Blob(['﻿'+doc],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
